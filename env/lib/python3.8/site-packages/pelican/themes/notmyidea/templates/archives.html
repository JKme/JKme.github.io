{% extends "base.html" %}
{% block content %}
<section id="content" class="body">
<!-- <h1>Archives for {{ SITENAME }}</h1> -->

<dl>
{% for year, articles in dates|groupby( 'date.year' )|reverse %}
<h2>{{ year }}</h2>
<ul>
{% for article in articles %}
 <!--    <dt>{{ article.title }}</dt> -->
    <dd><li>{{ article.date|strftime('%b %d ') }}<a href="{{ SITEURL }}/{{ article.url }}">{{ article.title }}</a></li></dd>
{% endfor %}

</dl>
</ul>
{% endfor %}
</section>

{% endblock %}
