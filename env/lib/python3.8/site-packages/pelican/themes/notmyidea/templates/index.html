{% extends "base.html" %}
{% block content %}
<section id="content" class="body">
<!-- <h1>Archives for {{ SITENAME }}</h1> -->


{% for year, articles in dates|groupby( 'date.year' )|reverse %}
<h2>{{ year }}</h2>
<dl>
<ul>
{% for article in articles %}
    <dd><a href="{{ SITEURL }}/{{ article.url }}">{{ article.title }}<spcan class="post-label">{{ article.date|strftime('%b  %d  ') }}</spcan></li></dd>
{% endfor %}

</dl>
</ul>
{% endfor %}
</section>

{% endblock %}
